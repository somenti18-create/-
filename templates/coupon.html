<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>クーポン | デカ盛り弁当はるき</title>
  <link href="https://fonts.googleapis.com/css2?family=Yuji+Syuku&family=M+PLUS+Rounded+1c:wght@900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: linear-gradient(160deg, #FFD700 0%, #FFC200 50%, #FFB300 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: 'M PLUS Rounded 1c', sans-serif;
    }
    .card {
      background: white;
      border-radius: 24px;
      padding: 36px 28px 32px;
      max-width: 360px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    }
    .logo {
      width: 140px;
      border-radius: 10px;
      margin-bottom: 20px;
    }
    .prize-img {
      width: 100%;
      max-height: 200px;
      object-fit: cover;
      border-radius: 14px;
      margin-bottom: 16px;
    }
    .prize-name {
      font-size: 30px;
      font-family: 'Yuji Syuku', serif;
      margin-bottom: 10px;
    }
    .prize-desc {
      font-size: 16px;
      font-weight: 900;
      color: #555;
      line-height: 1.7;
      margin-bottom: 20px;
      white-space: pre-line;
    }
    .warning {
      background: #FFF3E0;
      border-left: 4px solid #FF8C00;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 13px;
      color: #E65100;
      text-align: left;
      line-height: 1.7;
      margin-bottom: 20px;
    }
    .used-badge {
      background: #eee;
      color: #999;
      border-radius: 50px;
      padding: 16px;
      font-size: 18px;
      font-weight: bold;
    }
    .receive-btn {
      width: 100%;
      background: linear-gradient(135deg, #FF4500, #FF8C00);
      color: white;
      border: none;
      border-radius: 50px;
      padding: 16px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
    }
    .receive-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .line-btn {
      display: block;
      background: #06C755;
      color: white;
      text-decoration: none;
      border-radius: 50px;
      padding: 16px;
      font-size: 18px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="card">
  <img class="logo" src="/static/logo.jpg" alt="デカ盛り弁当はるき">

  {% if coupon['prize_image'] %}
  <img class="prize-img" src="{{ coupon['prize_image'] }}" alt="{{ coupon['prize_name'] }}">
  {% endif %}

  <div class="prize-name" style="color: {{ coupon['prize_color'] }}">{{ coupon['prize_name'] }}</div>
  <div class="prize-desc">{{ coupon['prize_desc'] }}</div>

  {% if coupon['used'] %}
    <div class="used-badge">このクーポンは使用済みです</div>
  {% elif coupon['coupon_url'] %}
    <div class="warning">店員の前でボタンを押してください。<br>それ以外での使用は無効となります。</div>
    <a class="line-btn" href="{{ coupon['coupon_url'] }}" target="_blank">LINEで日程を連絡する 💬</a>
  {% else %}
    <div class="warning">店員の前でボタンを押してください。<br>それ以外での使用は無効となります。</div>
    <button class="receive-btn" id="receiveBtn" onclick="receive()">受け取る 🎁</button>
  {% endif %}
</div>

<script>
const COUPON_CODE = "{{ coupon['code'] }}";

function receive() {
  const btn = document.getElementById('receiveBtn');
  btn.disabled = true;
  btn.textContent = '処理中...';

  fetch('/redeem', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ code: COUPON_CODE })
  })
  .then(r => r.json())
  .then(data => {
    if (data.success) {
      btn.textContent = '受け取り済み ✅';
      btn.style.background = '#9E9E9E';
    } else {
      btn.textContent = data.message || 'エラー';
      btn.disabled = false;
    }
  })
  .catch(() => {
    btn.textContent = '通信エラー。再度お試しください';
    btn.disabled = false;
  });
}
</script>

</body>
</html>
